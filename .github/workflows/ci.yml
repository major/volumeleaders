name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --group dev --all-extras

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Type check
        run: uv run ty check src/

      - name: Complexity check
        run: |
          uv run radon cc src/ -s --min C | grep -q . \
            && { echo "FAIL: Cyclomatic complexity C or higher detected"; exit 1; } \
            || echo "PASS: All functions rated A or B"

      - name: Test
        run: uv run pytest --cov=volumeleaders --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml
